<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Grid + Flexbox</title>

    <link rel="stylesheet" href="style05.css">
</head>
<body>

    <div class="dashboard">

       
        <header class="header">
            <h1>Dashboard</h1>
        </header>

        
        <aside class="sidebar">

            <div class="menu">Inicio</div>
            <div class="menu">Reportes</div>
            <div class="menu">Usuarios</div>
            <div class="menu">Productos</div>

        </aside>

        <main class="contenido">

            <div class="card">
                <h2>Ventas</h2>
                <p>1,234</p>
            </div>

            <div class="card">
                <h2>Usuarios</h2>
                <p>567</p>
            </div>

            <div class="card">
                <h2>Pedidos</h2>
                <p>89</p>
            </div>

        </main>

       
        <footer class="footer">
            <p>© 2026 Dashboard Layout</p>
        </footer>

    </div>

</body>
</html>
